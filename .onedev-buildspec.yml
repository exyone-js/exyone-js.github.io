version: 36
jobs:
- name: Build Blog
  steps:
  - !CheckoutStep
    name: checkout
    cloneCredential: !DefaultCredential {}
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: setup build environment
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      mkdir -p "$BUILD_DIR"
      cp -r . "$BUILD_DIR/"
      cd "$BUILD_DIR"
      export PATH="/usr/local/bin:$PATH"
      node --version
      npm --version
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: install dependencies
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      cd "$BUILD_DIR"
      npm ci
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: build site
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      cd "$BUILD_DIR"
      npm run build
      if [ -d "_site" ]; then
        echo "Build successful! _site directory created."
        ls -la _site/
      else
        echo "Build failed! _site directory not found."
        exit 1
      fi
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !SetBuildVersionStep
    name: set build version
    buildVersion: '@build_number@'
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  triggers:
  - !BranchUpdateTrigger
    branches: main
    paths: 
    - src/**
    - package.json
    - package-lock.json
    - .eleventy.js
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 1800

- name: Deploy to Cloudflare Pages
  steps:
  - !CheckoutStep
    name: checkout
    cloneCredential: !DefaultCredential {}
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: build
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      if [ ! -d "$BUILD_DIR/_site" ]; then
        mkdir -p "$BUILD_DIR"
        cp -r . "$BUILD_DIR/"
        cd "$BUILD_DIR"
        export PATH="/usr/local/bin:$PATH"
        npm ci
        npm run build
      fi
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: deploy to cloudflare
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      cd "$BUILD_DIR"
      if ! command -v wrangler &> /dev/null; then
        npm install -g wrangler
      fi
      export CLOUDFLARE_API_TOKEN="@secret:cloudflare-api-token@"
      export CLOUDFLARE_ACCOUNT_ID="@secret:cloudflare-account-id@"
      npx wrangler pages deploy _site \
        --project-name exyone-blog \
        --branch main \
        --commit-dirty=true
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  triggers:
  - !BranchUpdateTrigger
    branches: main
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 60
  timeout: 1800

- name: Deploy to Netlify
  steps:
  - !CheckoutStep
    name: checkout
    cloneCredential: !DefaultCredential {}
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: build
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      if [ ! -d "$BUILD_DIR/_site" ]; then
        mkdir -p "$BUILD_DIR"
        cp -r . "$BUILD_DIR/"
        cd "$BUILD_DIR"
        export PATH="/usr/local/bin:$PATH"
        npm ci
        npm run build
      fi
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: deploy to netlify
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      cd "$BUILD_DIR"
      if ! command -v netlify &> /dev/null; then
        npm install -g netlify-cli
      fi
      netlify deploy \
        --prod \
        --dir _site \
        --site @secret:netlify-site-id@ \
        --auth @secret:netlify-auth-token@ \
        --message "Deploy from OneDev build @build_number@"
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  triggers:
  - !BranchUpdateTrigger
    branches: main
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 60
  timeout: 1800

- name: Deploy to Codeberg Pages
  steps:
  - !CheckoutStep
    name: checkout
    cloneCredential: !DefaultCredential {}
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: build
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      if [ ! -d "$BUILD_DIR/_site" ]; then
        mkdir -p "$BUILD_DIR"
        cp -r . "$BUILD_DIR/"
        cd "$BUILD_DIR"
        export PATH="/usr/local/bin:$PATH"
        npm ci
        npm run build
      fi
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  - !CommandStep
    name: deploy to codeberg pages
    commands:
    - |
      BUILD_DIR="/tmp/exyone-blog-build"
      DEPLOY_DIR="/tmp/codeberg-deploy"
      cd "$BUILD_DIR"
      git config --global user.email "[email protected]"
      git config --global user.name "OneDev CI"
      git clone @secret:codeberg-pages-repo-url@ "$DEPLOY_DIR" --depth 1
      rm -rf "$DEPLOY_DIR"/*
      cp -r _site/* "$DEPLOY_DIR/"
      cd "$DEPLOY_DIR"
      echo "exyone.js.cool" > .domains
      git add .
      git commit -m "Deploy: Update site from OneDev build @build_number@"
      git push -f origin main
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  triggers:
  - !BranchUpdateTrigger
    branches: main
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 60
  timeout: 1800

