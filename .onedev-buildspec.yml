- name: Backup to Codeberg
  steps:
  - type: CommandStep
    name: push to codeberg
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        git remote add codeberg '@secret:codeberg-backup-repo-url@'
        git push codeberg --all --force
        git push codeberg --tags --force
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  triggers:
  - type: BranchUpdateTrigger
    branches: main
  - type: TagCreateTrigger
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 600

