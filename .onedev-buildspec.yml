- name: Backup to Codeberg
  steps:
  - !PushRepository
    name: push to codeberg
    remoteUrl: '@secret:codeberg-backup-repo-url@'
    userName: '@secret:codeberg-username@'
    password: '@secret:codeberg-token@'
    pushAllBranches: true
    pushAllTags: true
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  triggers:
  - !BranchUpdateTrigger
    branches: main
  - !TagCreateTrigger {}
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 600

- name: Backup to Git.gay
  steps:
  - !PushRepository
    name: push to git.gay
    remoteUrl: '@secret:gitgay-backup-repo-url@'
    userName: '@secret:gitgay-username@'
    password: '@secret:gitgay-token@'
    pushAllBranches: true
    pushAllTags: true
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  
  triggers:
  - !BranchUpdateTrigger
