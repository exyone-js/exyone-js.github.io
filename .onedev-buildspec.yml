version: 47
jobs:
- name: Build Blog
  steps:
  - type: CheckoutStep
    name: checkout
    cloneCredential:
      type: DefaultCredential
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: setup build environment
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        BUILD_DIR="/tmp/exyone-blog-build"
        mkdir -p "$BUILD_DIR"
        cp -r . "$BUILD_DIR/"
        cd "$BUILD_DIR"
        export PATH="/usr/local/bin:$PATH"
        node --version
        npm --version
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: install dependencies
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        cd /tmp/exyone-blog-build
        if [ -d "node_modules" ]; then
          echo "node_modules exists, skipping npm ci"
        else
          echo "node_modules not found, running npm ci"
          npm ci
        fi
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: build site
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        cd /tmp/exyone-blog-build
        npm run build
        if [ -d "_site" ]; then
          echo "Build successful! _site directory created."
          ls -la _site/
        else
          echo "Build failed! _site directory not found."
          exit 1
        fi
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  - type: SetBuildVersionStep
    name: set build version
    buildVersion: '@build_number@'
    condition: SUCCESSFUL
    optional: false
  
  triggers:
  - type: BranchUpdateTrigger
    branches: main
    userMatch: anyone
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 1800

- name: Deploy to Cloudflare Pages
  steps:
  - type: CheckoutStep
    name: checkout
    cloneCredential:
      type: DefaultCredential
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: build
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        BUILD_DIR="/tmp/exyone-blog-build"
        if [ ! -d "$BUILD_DIR/_site" ]; then
          mkdir -p "$BUILD_DIR"
          cp -r . "$BUILD_DIR/"
          cd "$BUILD_DIR"
          export PATH="/usr/local/bin:$PATH"
          if [ -d "node_modules" ]; then
            echo "node_modules exists, skipping npm ci"
          else
            echo "node_modules not found, running npm ci"
            npm ci
          fi
          npm run build
        fi
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: deploy to cloudflare
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        cd /tmp/exyone-blog-build
        export PATH="/usr/local/bin:$(npm root -g):$PATH"
        if ! command -v wrangler &> /dev/null; then
          npm install -g wrangler
        fi
        export CLOUDFLARE_API_TOKEN="@secret:cloudflare-api-token@"
        export CLOUDFLARE_ACCOUNT_ID="@secret:cloudflare-account-id@"
        npx wrangler pages deploy _site --project-name exyone --branch main --commit-dirty=true
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  triggers:
  - type: BranchUpdateTrigger
    branches: main
    userMatch: anyone
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 60
  timeout: 1800

- name: Deploy to Netlify
  steps:
  - type: CheckoutStep
    name: checkout
    cloneCredential:
      type: DefaultCredential
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: build
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        BUILD_DIR="/tmp/exyone-blog-build"
        if [ ! -d "$BUILD_DIR/_site" ]; then
          mkdir -p "$BUILD_DIR"
          cp -r . "$BUILD_DIR/"
          cd "$BUILD_DIR"
          export PATH="/usr/local/bin:$PATH"
          if [ -d "node_modules" ]; then
            echo "node_modules exists, skipping npm ci"
          else
            echo "node_modules not found, running npm ci"
            npm ci
          fi
          npm run build
        fi
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: deploy to netlify
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        cd /tmp/exyone-blog-build
        export PATH="/usr/local/bin:$(npm root -g):$PATH"
        npx netlify-cli deploy --prod --dir _site --site @secret:netlify-site-id@ --auth @secret:netlify-auth-token@ --message "Deploy from OneDev build @build_number@"
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  triggers:
  - type: BranchUpdateTrigger
    branches: main
    userMatch: anyone
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 60
  timeout: 1800

- name: Deploy to Codeberg Pages
  steps:
  - type: CheckoutStep
    name: checkout
    cloneCredential:
      type: DefaultCredential
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: build
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        BUILD_DIR="/tmp/exyone-blog-build"
        if [ ! -d "$BUILD_DIR/_site" ]; then
          mkdir -p "$BUILD_DIR"
          cp -r . "$BUILD_DIR/"
          cd "$BUILD_DIR"
          export PATH="/usr/local/bin:$PATH"
          if [ -d "node_modules" ]; then
            echo "node_modules exists, skipping npm ci"
          else
            echo "node_modules not found, running npm ci"
            npm ci
          fi
          npm run build
        fi
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  - type: CommandStep
    name: deploy to codeberg pages
    runInContainer: false
    interpreter:
      type: DefaultInterpreter
      commands: |
        BUILD_DIR="/tmp/exyone-blog-build"
        DEPLOY_DIR="/tmp/codeberg-deploy"
        cd "$BUILD_DIR"
        git config --global user.email "[email protected]"
        git config --global user.name "OneDev CI"
        # Remove entire deploy directory (including .git) to ensure clean state
        rm -rf "$DEPLOY_DIR"
        git clone @secret:codeberg-pages-repo-url@ "$DEPLOY_DIR" --depth 1
        # Clear all files except .git
        find "$DEPLOY_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
        cp -r _site/* "$DEPLOY_DIR/"
        cd "$DEPLOY_DIR"
        echo "exyone.js.cool" > .domains
        git add .
        git commit -m "Deploy: Update site from OneDev build @build_number@"
        git push -f origin main
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  
  triggers:
  - type: BranchUpdateTrigger
    branches: main
    userMatch: anyone
  
  retryCondition: never
  maxRetries: 3
  retryDelay: 60
  timeout: 1800

